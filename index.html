<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B13-A5</title>

    <!-- link fav -->
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- tailwind and daisy link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font html-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- css link -->
    <link rel="stylesheet" href="./style.css" />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google font css -->
    <style>
      body {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body>
    <section class="text-center  w-full space-y-7
    mx-auto pt-20">
      <div>
        <img class="mx-auto" src="./assets/github-logo.png" alt="" />
        <h3 class="font-semibold text-2xl">GitHub Issues Tracker</h3>
        <p class="text-">Sign in to manage your issues</p>
      </div>

      <div>
        <fieldset
          class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 mx-auto "
        >
          

          <label class=" font-black label ">Username</label>
          <input type="username" maxlength="5" id="name-input"  class="input " placeholder="Enter Username" />
          <p class=" text-[#4A00FF] text-start ">Default: admin</p>

          <label class=" font-black label">Password</label>
          <input type="password" maxlength="8" class="input" id="input-pass" placeholder="Enter Password" />
          <p class="text-[#4A00FF] text-start">Default: admin123</p>

          <button class="btn btn-primary mt-4" id="login-btn">Sign In</button>
        </fieldset>
      </div>
      <div>
        <p class="font-bold">Demo Credentials:</p>
        <p class="font-semibold pt-10">Username: admin</p>
        <p class="font-semibold">Password: admin123</p>
      </div>
    </section>

    <script src="./login/login.js"></script>
  </body>
</html>
